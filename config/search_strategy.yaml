      - "opened our office"

# ---------------------------------------------------------------------------
# REDDIT: Any business type — small business, firms (law, architecture, consulting), retail, service.
# NOT tech/CS/indie builders ("I built this app"). NOT large MNCs.
# ---------------------------------------------------------------------------
reddit_sources:
  # Any small business / business owners — retail, service, professional
  business_owners:
    - smallbusiness
    - SweatyStartup
    - Entrepreneur
    - Etsy
    - EtsySellers
    - shopify
    - ecommerce
  # Professional services: law, consulting, architecture, accounting (small firms)
  professional_services:
    - LawFirm
    - consulting
    - smallbusiness
    - Entrepreneur
    - Accounting
    - Construction
    - marketing
  # Local / physical: restaurants, bars, retail, cleaning (one of many business types)
  local_business:
    - smallbusiness
    - SweatyStartup
    - restaurant_owners
    - BarOwners
    - Etsy
    - EtsySellers
    - shopify
  sellers_retail:
    - Etsy
    - EtsySellers
    - shopify
    - ecommerce
    - FulfillmentByAmazon
    - smallbusiness
  uk:
    - UKBusiness
    - smallbusiness
    - Entrepreneur
  india:
    - indianstartups
    - smallbusiness
    - Entrepreneur
  australia:
    - AusFinance
    - smallbusiness
    - Entrepreneur
  canada:
    - PersonalFinanceCanada
    - smallbusiness
    - Entrepreneur
  europe:
    - smallbusiness
    - Entrepreneur
  startups_optional:
    - startups
    - Entrepreneur
    - smallbusiness

reddit_active_groups:
  - business_owners
  - professional_services
  - local_business
  - sellers_retail
  - uk
  - india
  - australia
  - canada
  - europe

# ---------------------------------------------------------------------------
# LIMITS — high volume so enough posts pass the strict filter (global + latest)
# ---------------------------------------------------------------------------
limits:
  max_search_terms_per_platform:
    linkedin: 35
    twitter: 40
    instagram: 40
    facebook: 35
    reddit: 40
  max_subreddits: 25
  # Latest first: "new" sort; "day" = last 24h (no re-scrape), "week" = last 7 days
  reddit_sort: "new"
  reddit_time_filter: "day"
  announcement_term_ratio: 0.8
  # Pass "since" to actors that support it (from last run) to avoid re-fetching same posts
  use_since_from_state: true
