# Relevance & Keyword Matching — Single source of truth for "best posts" = highest potential customers
# Strategy: MAJORITY = announcements (new business, just opened, launched); SECONDARY = explicit "need developer"
# Version 1.1 — Announcement-first lead gen

version: "1.0"
description: "Announcement-first intent tiers. Launch/new-business posts score highest; hire-intent secondary."

# ---------------------------------------------------------------------------
# INTENT TIERS (checked in order; higher weight = more points)
# ---------------------------------------------------------------------------

