# ---------------------------------------------------------------------------
# SYNONYMS — Expand match without listing every variant (used in phrase matching)
# Key: canonical word in phrases; Value: alternatives that count as match
# ---------------------------------------------------------------------------
synonyms:
  developer: [dev, engineer, programmer, coder, software developer, devs]
  hire: [hiring, hired, recruit, recruiting, looking for, seeking, need, want]
  build: [built, building, create, creating, develop, developing, make, making]
  team: [developer team, dev team, tech team, engineering team, development team]
  help: [assist, support, guidance, advice, help with]
  project: [app, application, product, mvp, platform, tool, software]
  freelance: [freelancer, contract, contractor, consultant, gig]
  cofounder: [co-founder, co founder, technical founder, founding team]
  recommend: [recommendation, recommend a, suggestions, suggest]
  budget: [pay, rate, compensation, salary, $, budget for]
  urgent: [asap, immediately, soon, quick, fast, deadline]
  startup: [start-up, early stage, early-stage, founded, launching]

# ---------------------------------------------------------------------------
# QUALITY SIGNALS — Bonus points (applied on top of intent score)
# ---------------------------------------------------------------------------
quality_signals:
  # Contact = likely reachable (big boost)
  contact:
    patterns:
      - "[a-z0-9._%+-]+@[a-z0-9.-]+\\.[a-z]{2,}"  # email regex applied separately
      - "dm me"
      - "message me"
      - "reach out"
      - "contact me"
      - "email me"
      - "apply at"
      - "reply to"
      - "send me"
    points: 4

  # Budget = serious buyer
  budget:
    patterns:
      - "budget"
      - "pay"
      - "rate"
      - "salary"
      - "compensation"
      - "\\$[0-9]"
      - "k per"
      - "per hour"
      - "hourly"
      - "fixed price"
      - "equity"
    points: 3

  # Urgency = ready to act soon
  urgency:
    patterns:
      - "asap"
      - "urgent"
      - "immediately"
      - "soon"
      - "deadline"
      - "need by"
      - "time sensitive"
      - "right away"
      - "quick"
      - "fast turnaround"
    points: 2

  # Decision-maker language
  decision_maker:
    patterns:
      - "our company"
      - "our business"
      - "we need"
      - "we're looking"
      - "we are hiring"
      - "my startup"
      - "i'm building"
      - "i need"
    points: 2

  # Launch / new thing = good lead to pitch software or website (announcement-style)
  launch_signal:
    patterns:
      - "just launched"
      - "just opened"
      - "grand opening"
      - "new business"
      - "started my"
      - "we started"
      - "new venture"
      - "now open"
      - "open for business"
      - "new cafe"
      - "new restaurant"
      - "new shop"
      - "we're live"
      - "proud to announce"
      - "new journey"
    points: 4

# ---------------------------------------------------------------------------
# MINIMUM GATE — Relaxed: more borderline posts pass; AI will filter further.
# ---------------------------------------------------------------------------
minimum_gate:
  require_high_or_medium: true
  require_announcement_or_high: true
  # Allow soft combo (e.g. "startup" + "building") so more leads reach static filter / AI
  allow_soft_combo: true
  # Lower = more posts pass (3 = one medium phrase or soft combo can pass)
  min_intent_points: 3
  # If set (e.g. 6), medium-only posts with intent_points >= this can pass (reduces false negatives)
  allow_medium_with_min_points: 0

# ---------------------------------------------------------------------------
# NEGATIVE PATTERNS — Reject if any match (reference filters.yaml or inline)
# ---------------------------------------------------------------------------
negative_categories:
  - learning
  - hobby
  - job_seeking
  - open_source
  - low_quality
