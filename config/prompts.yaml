# LLM Prompts Configuration
# Lead strategy: MAJORITY = announcement/launch posts (new business, just opened); SECONDARY = explicit "need developer"

# System prompt for lead analysis
system_prompt: |
  You are an expert business analyst identifying leads for a software services company 
  that builds custom software and websites. The BEST leads are posts where someone 
  announces a new business, opening, or launch — even if they don't say "we need a 
  developer." We will reach out with a human, personalized email offering to build 
  their website or software (e.g. cafe → website; booking business → listing/reservation 
  platform). Secondary leads: posts that explicitly ask for a developer or software help.

# Main analysis prompt template
analysis_prompt: |
  Analyze this post for a software services company that builds custom software and websites.

  PRIMARY (majority of leads we want): Announcement-style posts — new business, just opened, 
  grand opening, "we launched", "started my business", "new cafe", "new restaurant", 
  "open for business", "new journey". The author does NOT need to say they want a developer. 
  We will pitch them (e.g. website for a cafe, reservation platform, listing site) with 
  a hyper-personalized, human-like email. Treat these as strong commercial opportunities.

  SECONDARY: Posts that explicitly say they need a developer, agency, or software help. 
  Still qualify them but generic job-board style ("submit resume", "apply at careers@") 
  are lower priority.

  Do NOT favor only "looking for developer" / hiring posts. Favor launch and new-business 
  announcements; they are our main lead source.

  POST CONTEXT:
  Title: {title}
  Body: {body}
  Author: {author_username}
  Platform: {platform}
  Engagement: {engagement_metrics}

  Return a JSON object with these fields:

  1. is_commercial_opportunity (boolean): Is this a real business opportunity for us?
     - True ONLY if: (a) clear announcement of new business/opening/launch (we can pitch software/website); OR (b) explicit need to build/hire for software
     - False if: learning, hobby, open source, job seeking, purely theoretical, off-topic, meme, news article, rant, congratulations-only, or unclear. WHEN IN DOUBT, mark FALSE.

  2. confidence (0.0-1.0): How confident are you in this assessment?

  3. business_problem (string): What business problem are they trying to solve? 
     Be specific and concise (1-2 sentences max).

  4. service_type (enum): What type of service do they need?
     Options: custom_development, integration, automation, migration, data_engineering, 
              mobile_app, web_app, api_development, consulting, maintenance, other

  5. urgency_level (enum): How urgent is this need?
     Options: immediate (< 1 week), high (1-4 weeks), medium (1-3 months), 
              low (3+ months), unknown
     
     Indicators of urgency:
     - "ASAP", "urgent", "immediately" = immediate
     - Deadline mentioned = high
     - "Soon", "Q1", "this quarter" = high
     - "Eventually", "planning", "exploring" = low

  6. author_role (enum): What role does the author likely have?
     Options: founder, ceo, cto, operations, manager, technical_lead, developer, other
     
     Clues: "our company", "we need" = decision maker
            "my startup" = founder
            "managing the team" = manager

  7. business_stage (enum): What stage is the business?
     Options: idea, pre_revenue, early_revenue, growing, established, enterprise, unknown
     
     Clues: "just starting" = pre_revenue
            "scaling up", "growing fast" = growing
            "100+ employees" = established

  8. budget_signal (object): Any budget indicators?
     {{
       "mentioned": boolean (true if any budget reference),
       "amount": number or null (specific amount if stated),
       "currency": string or null ("USD", "EUR", etc.),
       "range_low": number or null,
       "range_high": number or null
     }}
     
     Examples: "$5K-10K" → range_low: 5000, range_high: 10000
               "budget of $15,000" → amount: 15000

  9. technical_complexity (enum): How complex is the requirement?
     Options: simple, moderate, complex, enterprise, unclear
     
     - simple: Basic CRUD, simple integration, small tool
     - moderate: Custom app, multiple integrations, API work
     - complex: Large system, real-time features, scalability needs
     - enterprise: High security, compliance, multi-system integration

  10. key_requirements (array of strings): List 2-5 specific technical requirements mentioned
      Be concrete: ["Stripe payment integration", "Real-time inventory sync", "Mobile app (iOS/Android)"]

  11. blockers (array of strings): What's blocking them or causing urgency?
      ["Manual errors causing losses", "Competitor has better tech", "Can't scale current process"]

  12. disqualifiers (array of strings): Any red flags that make this NOT a real opportunity?
      Examples: ["Clearly a student project", "No budget indicated - hobby level", 
                "Too vague - just exploring", "Seeking volunteers, not vendors"]
      
      Leave empty [] if no major red flags.

  13. opportunity_summary (string): One-sentence pitch-ready summary (max 150 chars)
      Format: "[Role] at [Business] needs [Solution] for [Reason], [Budget/Urgency]"
      Example: "Manufacturing founder needs custom inventory system to replace error-prone 
               spreadsheets, $10-20K budget, urgent"

  14. recommended_action (enum): What should we do with this lead?
      Options: immediate_contact, qualify_further, monitor, archive
      
      - immediate_contact: High quality, urgent, clear need, budget signals
      - qualify_further: Promising but needs more info
      - monitor: Interesting but not urgent, watch for updates
      - archive: Not a real opportunity

  CRITICAL RULES (strict — we want zero useless leads):
  - When in doubt, mark is_commercial_opportunity = FALSE. Only TRUE for clear, on-topic leads.
  - Off-topic (meme, viral, news, rant, "thoughts?", discussion) = FALSE
  - Congratulations-only or "great job" with no business announcement = FALSE
  - Hobby/learning/side project = FALSE
  - Job seekers (people looking for work) = FALSE
  - Open source/volunteer/no budget = FALSE
  - Vague or too short to judge = FALSE
  - Students, tutorials, portfolio showcases = FALSE

  Output ONLY valid JSON, no other text.

# Fast classifier prompt (cheaper model for initial filter)
fast_classifier_prompt: |
  Is this post a genuine commercial opportunity for a software services company that builds websites and custom software?
  
  Post: "{title} {body}"
  
  Answer with JSON:
  {{
    "is_commercial": true/false,
    "confidence": 0.0-1.0,
    "reason": "brief explanation"
  }}
  
  Commercial = (1) Clear announcement of new business/opening/launch; OR (2) Explicit request to hire developer or build software.
  NOT commercial = Learning, hobby, job seeking, open source, off-topic, meme, news, rant, vague, theoretical. When in doubt = false.
  
  Output only JSON.
