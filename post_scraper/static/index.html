<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post Scraper – Test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 640px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #1a1a1a;
      background: #f8f9fa;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .sub {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.35rem;
    }
    input[type="url"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 1rem;
    }
    input[type="url"]:focus {
      outline: none;
      border-color: #0d6efd;
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.2);
    }
    button {
      padding: 0.6rem 1.25rem;
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      background: #0d6efd;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #0b5ed7; }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    #status {
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #status.loading {
      background: #e7f1ff;
      color: #0a58ca;
    }
    #status.success {
      background: #d1e7dd;
      color: #0f5132;
    }
    #status.error {
      background: #f8d7da;
      color: #842029;
    }
    #status:empty { display: none; }
    .path { font-family: ui-monospace, monospace; font-size: 0.85em; }
    .meta-line { margin: 0.25rem 0; }
  </style>
</head>
<body>
  <h1>Post Scraper</h1>
  <p class="sub">Paste a social media post URL (Instagram, YouTube, TikTok, Twitter, etc.) and click Download.</p>

  <label for="url">Post URL</label>
  <input type="url" id="url" placeholder="https://www.instagram.com/reel/... or https://www.youtube.com/watch?v=..." autocomplete="off">

  <button type="button" id="btn">Download</button>

  <div id="status" aria-live="polite"></div>

  <script>
    const urlInput = document.getElementById('url');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');

    function setStatus(html, type) {
      status.innerHTML = html;
      status.className = type || '';
    }

    function formatResult(data) {
      if (data.error) {
        return '<strong>Error</strong>: ' + escapeHtml(data.error);
      }
      let s = '<strong>Platform:</strong> ' + escapeHtml(data.platform) + '\n';
      if (data.media_path) s += '<strong>Video:</strong> <span class="path">' + escapeHtml(data.media_path) + '</span>\n';
      if (data.thumbnail_path) s += '<strong>Thumbnail:</strong> <span class="path">' + escapeHtml(data.thumbnail_path) + '</span>\n';
      if (data.audio_path) s += '<strong>Audio:</strong> <span class="path">' + escapeHtml(data.audio_path) + '</span>\n';
      if (data.metadata) {
        const m = data.metadata;
        if (m.author) s += '<span class="meta-line"><strong>Author:</strong> ' + escapeHtml(m.author) + '</span>\n';
        if (m.caption) s += '<span class="meta-line"><strong>Caption:</strong> ' + escapeHtml(m.caption.slice(0, 200)) + (m.caption.length > 200 ? '…' : '') + '</span>\n';
      }
      return s;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    btn.addEventListener('click', async function () {
      const url = urlInput.value.trim();
      if (!url) {
        setStatus('<strong>Please enter a URL.</strong>', 'error');
        return;
      }

      btn.disabled = true;
      setStatus('Scraping… (this may take a minute for video)', 'loading');

      try {
        const res = await fetch('/api/scrape', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url })
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus('<strong>Request failed:</strong> ' + escapeHtml(data.detail || res.statusText), 'error');
          return;
        }
        setStatus(formatResult(data), data.success ? 'success' : 'error');
      } catch (err) {
        setStatus('<strong>Request failed:</strong> ' + escapeHtml(err.message), 'error');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
